<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    A-Box favicon.
    - Dark slate background to match the app's chrome.
    - Amber triangular "A" mark.
    - Small cyan accent dot — matches the recommendation-star color used on the map.
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded background tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- Triangular A -->
  <path
    d="M 18 50 L 32 14 L 46 50"
    stroke="#fbbf24"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Crossbar -->
  <path
    d="M 24 38 L 40 38"
    stroke="#fbbf24"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Cyan accent dot — A-Box's recommendation-star color -->
  <circle cx="50" cy="50" r="3.5" fill="#06b6d4" stroke="#0b1220" stroke-width="1"/>
</svg>
